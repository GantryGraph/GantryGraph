name: Deploy docs to Vercel

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "src/gantrygraph/**"    # rebuild when API changes
  pull_request:
    branches: [main]
    paths:
      - "website/**"
  workflow_dispatch:             # allow manual trigger from GitHub UI

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: website/requirements.txt

      # Install the library so mkdocstrings can auto-generate API docs
      - name: Install gantrygraph (for API docs)
        run: pip install -e ".[dev]"

      - name: Install MkDocs dependencies
        run: pip install -r website/requirements.txt

      - name: Build site
        working-directory: website
        run: python -m mkdocs build --strict
        env:
          PYTHONPATH: ../src

      - name: Deploy to Vercel (preview on PRs)
        if: github.event_name == 'pull_request'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: website

      - name: Deploy to Vercel (production on main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          working-directory: website
