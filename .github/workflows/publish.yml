name: Publish to PyPI

on:
  release:
    types: [published]       # trigger: create a Release in GitHub UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build but do NOT upload to PyPI"
        required: false
        default: "false"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')

    # Trusted Publishing — no API token needed, just set up the publisher on pypi.org
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/gantrygraph

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
